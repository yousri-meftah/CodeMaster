services:
  postgres:
    container_name: "codemaster-postgres"
    image: postgres:15.4-alpine
    env_file:
      - ./backend/envs/pg.env
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 3s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks:
      - codemaster

  backend:
    container_name: "codemaster-backend"
    image: ${CODEMASTER_BACKEND_IMAGE:-yousri1/codemaster-backend}:${CODEMASTER_IMAGE_TAG:-latest}
    pull_policy: always
    env_file:
      - ./backend/envs/backend.env
      - ./backend/envs/pg.env
    environment:
      - RUNNING_IN_DOCKER=1
      - POSTGRES_HOST=postgres
      - HOST=0.0.0.0
      - PORT=8000
      - UVICORN_WORKERS=1
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:8000/healthz"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped
    networks:
      - codemaster

  web:
    container_name: "codemaster-web"
    image: ${CODEMASTER_WEB_IMAGE:-yousri1/codemaster-web}:${CODEMASTER_IMAGE_TAG:-latest}
    pull_policy: always
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "80:80"
    restart: unless-stopped
    networks:
      - codemaster

  prometheus:
    container_name: "codemaster-prometheus"
    image: prom/prometheus:v2.54.1
    volumes:
      - ./deploy/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "127.0.0.1:9090:9090"
    restart: unless-stopped
    networks:
      - codemaster

  grafana:
    container_name: "codemaster-grafana"
    image: grafana/grafana-oss:11.1.5
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_SERVER_ROOT_URL=http://localhost:3001
      - GF_SECURITY_COOKIE_SECURE=false
    depends_on:
      - prometheus
    ports:
      - "127.0.0.1:3001:3000"
    volumes:
      - grafana-data:/var/lib/grafana
    restart: unless-stopped
    networks:
      - codemaster

networks:
  codemaster:

volumes:
  postgres-data:
  grafana-data:
