server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # FastAPI routers commonly expose collection endpoints with a trailing slash.
  # Normalize `/api/<resource>` to `/api/<resource>/` to avoid backend 307 redirects
  # that can drop the `/api` prefix when proxied.
  location ~ ^/api/[^/]+$ {
    return 308 $uri/$is_args$args;
  }

  location /api/ {
    proxy_pass http://backend:8000/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /healthz {
    proxy_pass http://backend:8000/healthz;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
  }

  location / {
    try_files $uri /index.html;
  }
}
