name: docker-publish

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

env:
  REGISTRY: docker.io
  DOCKERHUB_NAMESPACE: yousri1

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract backend metadata
        id: backend_meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.DOCKERHUB_NAMESPACE }}/codemaster-backend
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=ref,event=tag
            type=sha

      - name: Extract web metadata
        id: web_meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.DOCKERHUB_NAMESPACE }}/codemaster-web
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=ref,event=tag
            type=sha

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/docker/Dockerfile
          push: true
          tags: ${{ steps.backend_meta.outputs.tags }}
          labels: ${{ steps.backend_meta.outputs.labels }}

      - name: Build and push web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./deploy/nginx/Dockerfile
          build-args: |
            VITE_API_BASE_URL=/api
          push: true
          tags: ${{ steps.web_meta.outputs.tags }}
          labels: ${{ steps.web_meta.outputs.labels }}

  deploy-homelab:
    needs: publish
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: [self-hosted, windows, homelab]
    concurrency:
      group: codemaster-homelab-deploy
      cancel-in-progress: false
    env:
      HOMELAB_REPO_PATH: ${{ vars.HOMELAB_REPO_PATH }}
    steps:
      - name: Validate homelab repo path
        shell: powershell
        run: |
          if ([string]::IsNullOrWhiteSpace($env:HOMELAB_REPO_PATH)) {
            throw "Repository variable HOMELAB_REPO_PATH is not set."
          }
          if (-not (Test-Path $env:HOMELAB_REPO_PATH)) {
            throw "HOMELAB_REPO_PATH does not exist: $env:HOMELAB_REPO_PATH"
          }

      - name: Pull latest CodeMaster images
        shell: powershell
        run: |
          Set-Location $env:HOMELAB_REPO_PATH
          docker compose -f docker-compose.yml -f docker-compose.codemaster.yml pull codemaster-backend codemaster-web

      - name: Recreate backend and web
        shell: powershell
        run: |
          Set-Location $env:HOMELAB_REPO_PATH
          docker compose -f docker-compose.yml -f docker-compose.codemaster.yml up -d codemaster-backend codemaster-web

      - name: Wait for backend container health
        shell: powershell
        run: |
          $deadline = (Get-Date).AddMinutes(5)
          do {
            try {
              $status = docker inspect --format "{{.State.Health.Status}}" codemaster-backend
              if ($status.Trim() -eq "healthy") {
                exit 0
              }
            } catch {
              Start-Sleep -Seconds 5
            }
          } while ((Get-Date) -lt $deadline)
          throw "Backend container health check failed for codemaster-backend"

      - name: Wait for web health
        shell: powershell
        run: |
          $deadline = (Get-Date).AddMinutes(5)
          do {
            try {
              $response = Invoke-WebRequest -UseBasicParsing http://localhost/healthz -TimeoutSec 5
              if ($response.StatusCode -eq 200) {
                exit 0
              }
            } catch {
              Start-Sleep -Seconds 5
            }
          } while ((Get-Date) -lt $deadline)
          throw "Web health check failed at http://localhost/healthz"
