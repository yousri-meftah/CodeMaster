apiVersion: batch/v1
kind: Job
metadata:
  name: codemaster-backend-migrate
  namespace: codemaster
  labels:
    app.kubernetes.io/name: codemaster
    app.kubernetes.io/component: backend
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 86400
  template:
    metadata:
      labels:
        app.kubernetes.io/name: codemaster
        app.kubernetes.io/component: backend-migration
    spec:
      restartPolicy: OnFailure
      containers:
        - name: migrate
          image: yousri1/codemaster-backend:latest
          imagePullPolicy: Always
          command:
            - sh
            - -lc
            - |
              until python -c "import os,socket; socket.create_connection((os.environ['POSTGRES_HOST'], 5432), 5).close()"; do
                sleep 2
              done
              export POSTGRES_URL="postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}/${POSTGRES_DB}"
              alembic upgrade head
          envFrom:
            - configMapRef:
                name: codemaster-backend
            - secretRef:
                name: codemaster-postgres
            - secretRef:
                name: codemaster-backend
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 512Mi
