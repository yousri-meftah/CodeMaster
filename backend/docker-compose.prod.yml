services:
  backend:
    container_name: "codemaster-backend"
    build:
      context: .
      dockerfile: ./docker/Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ./envs/backend.env
      - ./envs/pg.env
    environment:
      - RUNNING_IN_DOCKER=1
      - UVICORN_WORKERS=1
      - HOST=0.0.0.0
      - PORT=8000
      - POSTGRES_HOST=postgres
      # - REDIS_URL=redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      # redis:
      #   condition: service_started
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:8000/healthz"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    networks:
      - main
    restart: unless-stopped

  postgres:
    container_name: "codemaster-postgres"
    image: postgres:15.4-alpine
    env_file:
      - ./envs/pg.env
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 2s
      timeout: 5s
      retries: 5
    networks:
      - main
    restart: unless-stopped

  # redis:
  #   container_name: "codemaster-redis"
  #   image: redis:7-alpine
  #   ports:
  #     - "6379:6379"
  #   volumes:
  #     - redis-data:/data
  #   networks:
  #     - main
  #   restart: unless-stopped

networks:
  main:

volumes:
  postgres-data:
  # redis-data:
