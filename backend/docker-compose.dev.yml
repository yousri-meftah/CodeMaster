services:
  backend:
    container_name: "codemaster-backend-dev"
    build:
      context: .
      dockerfile: ./docker/Dockerfile.dev
    ports:
      - "8000:8000"
    volumes:
      - ./:/backend
    env_file:
      - ./envs/backend.env
      - ./envs/pg.env
    environment:
      - RUNNING_IN_DOCKER=1
      - UVICORN_RELOAD=1
      - UVICORN_WORKERS=1
      - HOST=0.0.0.0
      - PORT=8000
      - POSTGRES_HOST=postgres
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:8000/docs"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    networks:
      - main

  postgres:
    container_name: "codemaster-postgres-dev"
    image: postgres:15.4-alpine
    env_file:
      - ./envs/pg.env
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 2s
      timeout: 5s
      retries: 5
    networks:
      - main

  redis:
    container_name: "codemaster-redis-dev"
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - main

networks:
  main:

volumes:
  postgres-data:
  redis-data:
